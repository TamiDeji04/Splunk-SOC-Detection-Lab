# Four MITRE detections from the Splunk SOC lab.
# Import: merge into $SPLUNK_HOME/etc/users/admin/search/local/savedsearches.conf
#         then restart Splunk, or recreate via Settings > Searches, reports, and alerts.

[Detect - T1110.001 - Brute Force Password Guessing]
search = index=endpoint EventCode=4625 | stats count by Account_Name, Source_Network_Address | where count > 5
description = MITRE T1110.001 - Brute Force Password Guessing. Flags >5 failed logons from one source/account.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
is_visible = 1

[Detect - T1059.001 - Encoded PowerShell Execution]
search = index=endpoint EventCode=1 Image="*powershell.exe" CommandLine="*EncodedCommand*"
description = MITRE T1059.001 - Encoded PowerShell (-EncodedCommand).
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
is_visible = 1

[Detect - T1071.001 - Suspicious Outbound]
search = index=endpoint EventCode=3 (Image="*powershell.exe" OR Image="*cmd.exe") | stats count by Image, DestinationIp, DestinationPort
description = MITRE T1071.001 - Scripting engine outbound connections.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
is_visible = 1

[Detect - T1547.001 - Registry Run Key]
search = index=endpoint EventCode=13 TargetObject="*\\Run\\*"
description = MITRE T1547.001 - Registry Run key persistence.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
is_visible = 1
